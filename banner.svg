<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070D"/>
      <stop offset="55%" stop-color="#080C18"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>

    <radialGradient id="aurora1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 90) rotate(35) scale(520 320)">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1300 420) rotate(-30) scale(480 300)">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(750 500) rotate(0) scale(700 260)">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#AEB9D4"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60A5FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1B2540" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#aurora1)"/>
  <rect width="1500" height="500" fill="url(#aurora2)"/>
  <rect width="1500" height="500" fill="url(#aurora3)"/>

  <!-- Neural constellation motif -->
  <g stroke="#3B82F6" stroke-opacity="0.35" stroke-width="1">
    <line x1="120" y1="120" x2="260" y2="70"/>
    <line x1="260" y1="70" x2="360" y2="150"/>
    <line x1="120" y1="120" x2="180" y2="220"/>
    <line x1="1180" y1="380" x2="1320" y2="430"/>
    <line x1="1320" y1="430" x2="1420" y2="360"/>
    <line x1="1180" y1="380" x2="1260" y2="300"/>
    <line x1="1260" y1="300" x2="1420" y2="360"/>
  </g>
  <g fill="#60A5FA">
    <circle cx="120" cy="120" r="3.5"/>
    <circle cx="260" cy="70" r="2.5"/>
    <circle cx="360" cy="150" r="3"/>
    <circle cx="180" cy="220" r="2"/>
    <circle cx="1180" cy="380" r="3"/>
    <circle cx="1320" cy="430" r="2.5"/>
    <circle cx="1420" cy="360" r="3.5"/>
    <circle cx="1260" cy="300" r="2"/>
  </g>

  <!-- Glass panel -->
  <rect x="90" y="120" width="1320" height="270" rx="24" fill="#0E1526" fill-opacity="0.45" stroke="#3B4A6B" stroke-opacity="0.4"/>
  <rect x="90" y="120" width="1320" height="1.5" fill="#5B7BFA" fill-opacity="0.5"/>

  <text x="130" y="205" font-family="'JetBrains Mono', monospace" font-size="16" letter-spacing="6" fill="#60A5FA">SOFTWARE&#160;DEVELOPER&#160;&#8226;&#160;AI&#160;ENGINEER&#160;&#8226;&#160;JAVA&#160;DEVELOPER</text>

  <text x="128" y="300" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="86" font-weight="700" fill="url(#titleGrad)" filter="url(#softGlow)">NITIN RAJGOR</text>

  <rect x="130" y="325" width="420" height="3" fill="url(#accentLine)"/>

  <text x="130" y="365" font-family="'Inter', 'Segoe UI', sans-serif" font-size="21" fill="#8892A6">Building intelligent software with Java, AI &amp; Data Analytics</text>

  <text x="1370" y="365" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="15" fill="#5B6A8C">@Nitinrajgor07</text>
</svg>
